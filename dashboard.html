<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - PayPayGanha</title>
<link rel="stylesheet" href="style.css">
<script type="module" src="app.js"></script>
</head>
<body>

<header class="topo">
  <div class="logo-area">
    <img src="https://i.postimg.cc/G2K2SCFQ/C9541CCF_3AD6_4F7A_9CEA_33F2F300A8FB.jpg" class="logo">
    <h2 id="nomeUser">Usuário</h2>
  </div>

  <div class="saldo-area">
    <span id="saldo">Saldo: 0 AOA</span>
    <span id="pontos">Pontos: 0</span>
  </div>
</header>

<section class="grafico">
  <div class="linha-subindo"></div>
</section>

<section class="botoes-grid">
  <button onclick="abrirInvest()">Investir</button>
  <button onclick="abrirVideos()">Vídeos</button>
  <button onclick="abrirRecargas()">Recargas</button>
  <button onclick="abrirRoleta()">Roleta</button>
</section>

<section id="conteudo"></section>

</body>
</html>
